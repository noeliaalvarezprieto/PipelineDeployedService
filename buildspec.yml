version: 0.2

# ---------------------------------------------------------------------------
# PoC1 — buildspec.yml
# Build stage: static analysis, Docker build, ECR push, artefact packaging
# ---------------------------------------------------------------------------

env:
  secrets-manager:
    SONAR_TOKEN: poc1-app/sonar:token
  variables:
    NODE_ENV: production

phases:

  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm install -g npm@10.5.2
      - npm ci --prefer-offline

  pre_build:
    commands:
      # --- ECR login ---
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION |
          docker login --username AWS --password-stdin $ECR_REPO_URI

      # --- Tag image ---
      - COMMIT_SHA=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)
      - IMAGE_URI="$ECR_REPO_URI:$COMMIT_SHA"
      - IMAGE_LATEST="$ECR_REPO_URI:latest"
      - echo "Image will be tagged $IMAGE_URI"

  build:
    commands:
      # --- Run tests with coverage (GENERA coverage/lcov.info) ---
      - echo "Running tests with coverage..."
      - npm test
      - echo "Tests completed. Coverage report generated."

      # --- Build Docker image ---
      - echo "Building Docker image..."
      - docker build
          --cache-from $IMAGE_LATEST
          --build-arg NODE_ENV=$NODE_ENV
          --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          --build-arg VCS_REF=$CODEBUILD_RESOLVED_SOURCE_VERSION
          -t $IMAGE_URI
          -t $IMAGE_LATEST
          .
      - echo "Docker build complete."

      # --- Push to ECR ---
      - echo "Pushing image to ECR..."
      - docker push $IMAGE_URI
      - docker push $IMAGE_LATEST
      - echo "ECR push complete."

  post_build:
    commands:
      # --- Static analysis with SonarQube (DESPUÉS de tests) ---
      - echo "Running SonarQube static analysis..."
      - npx sonar-scanner
          -Dsonar.projectKey=noeliaalvarezprieto_PipelineDeployedService
          -Dsonar.organization=noeliaalvarezprieto
          -Dsonar.sources=src
          -Dsonar.exclusions=src/__tests__/**,**/node_modules/**,coverage/**,reports/**,src/index.js
          -Dsonar.tests=src/__tests__
          -Dsonar.test.inclusions=src/__tests__/**/*.test.js
          -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.login=$SONAR_TOKEN
          -Dsonar.qualitygate.wait=true
      - echo "Static analysis complete."

      # --- Generate imagedefinitions.json ---
      - echo "Generating imagedefinitions.json for ECS..."
      - printf '[{"name":"%s","imageUri":"%s"}]' poc1-app $IMAGE_URI > imagedefinitions.json
      - echo "Build artefacts written."
      - echo "Build complete — image $IMAGE_URI"

artifacts:
  files:
    - imagedefinitions.json
    - '**/*'
  discard-paths: no

reports:
  BuildLintReport:
    files:
      - 'reports/lint-results.xml'
    file-format: JUNITXML
    discard-paths: yes

cache:
  paths:
    - '/root/.npm/**/*'
    - node_modules/**/*'